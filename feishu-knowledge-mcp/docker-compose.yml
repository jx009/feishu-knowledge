# ============================================
# 飞书知识库 MCP Server - Docker Compose 部署
# ============================================
#
# 使用方式：
#   docker-compose up -d        # 启动 Qdrant
#   docker-compose down         # 停止
#   docker-compose logs qdrant  # 查看日志
#
# Qdrant Dashboard：http://localhost:7003/dashboard
# MCP Dashboard：http://localhost:7000（需启动 MCP Server）

services:
  app:
    image: ${APP_IMAGE:-feishu-knowledge-mcp:latest}
    container_name: feishu-knowledge-mcp
    command: python server.py
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/runtime}
      DASHBOARD_HOST: ${DASHBOARD_HOST:-0.0.0.0}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8080}
      DASHBOARD_DATABASE_URL: ${DASHBOARD_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/feishu_knowledge}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8001}
      MCP_SSE_PATH: ${MCP_SSE_PATH:-/mcp/sse}
      MCP_MESSAGE_PATH: ${MCP_MESSAGE_PATH:-/mcp/messages}
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "7000:8080"
      - "7001:8001"
    volumes:
      - ./runtime:/app/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: feishu-knowledge-postgres
    environment:
      POSTGRES_DB: feishu_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "7002:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feishu_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: feishu-knowledge-qdrant
    ports:
      - "7003:6333"
      - "7004:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: always
